<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Work Bee</title>
    <style>
      html, body {
        background-color: #ffffff;
        color: #0f172a;
      }
    </style>
    <script>
      (function () {
        var storageKey = 'workbee-theme';
        var savedTheme = localStorage.getItem(storageKey);
        var systemDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = (savedTheme === 'light' || savedTheme === 'dark') ? savedTheme : (systemDark ? 'dark' : 'light');
        var isDark = theme === 'dark';
        var surface = isDark ? '#0f172a' : '#ffffff';
        var onSurface = isDark ? '#f1f5f9' : '#0f172a';
        var root = document.documentElement;

        root.setAttribute('data-theme', theme);
        root.style.setProperty('--surface', surface);
        root.style.setProperty('--on-surface', onSurface);
        root.style.backgroundColor = surface;
        root.style.color = onSurface;
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Inter:wght@100..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
